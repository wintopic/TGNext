name: Feature Request
description: Suggest an idea or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Thanks for the idea! Please provide details below."
  - type: input
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the feature.
      placeholder: "Short summary"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to Solve
      description: What problem does this feature solve?
      placeholder: "I want to... because..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      placeholder: "Describe the solution or behavior"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: "Any alternatives you've considered"
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      placeholder: "Mockups, examples, or relevant links"
    validations:
      required: false
